<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSD Document Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1218;
    --surface:#161c26;
    --surface-2:#1d2531;
    --border:#2a3342;
    --text:#e7ebf1;
    --text-muted:#8b94a6;
    --accent:#2dd4bf;
    --accent-dim:#1a8f80;
    --warn:#f0a63a;
    --danger:#e8636b;
    --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(45,212,191,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---- Top bar ---- */
  header{
    border-bottom:1px solid var(--border);
    background:rgba(22,28,38,0.7);
    backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:20;
  }
  .header-inner{
    max-width:1200px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:38px; height:38px; border-radius:9px;
    background:linear-gradient(135deg, var(--accent), var(--accent-dim));
    display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#06201c; font-size:15px;
  }
  .brand-text h1{font-size:15px; font-weight:600; letter-spacing:0.2px;}
  .brand-text p{font-size:12px; color:var(--text-muted); margin-top:1px;}
  .status-chip{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-family:'JetBrains Mono',monospace;
    color:var(--text-muted); border:1px solid var(--border);
    padding:3px 8px; border-radius:20px; margin-left:10px;
  }
  .status-dot{width:6px; height:6px; border-radius:50%; background:var(--text-muted);}
  .status-dot.live{background:var(--accent); box-shadow:0 0 8px var(--accent);}

  .auth-area{display:flex; align-items:center; gap:12px;}
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    border:none; border-radius:8px; font-size:13px; font-weight:600;
    padding:9px 16px; cursor:pointer; transition:filter .15s ease, transform .1s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--accent); color:#06201c;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent; color:var(--text); border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--surface-2);}
  .user-pill{
    display:flex; align-items:center; gap:8px;
    background:var(--surface-2); border:1px solid var(--border);
    padding:5px 12px 5px 5px; border-radius:20px; font-size:13px;
  }
  .avatar{
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(135deg,#3a4a63,#232c3b);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:600;
  }

  /* ---- Layout ---- */
  main{max-width:1200px; margin:0 auto; padding:28px 24px 60px;}

  .gate{
    max-width:460px; margin:80px auto; text-align:center;
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:40px 32px;
  }
  .gate .lock{
    width:52px; height:52px; border-radius:14px; margin:0 auto 20px;
    background:var(--surface-2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .gate h2{font-size:18px; margin-bottom:8px;}
  .gate p{font-size:13px; color:var(--text-muted); line-height:1.6; margin-bottom:24px;}
  .gate .fineprint{font-size:11px; color:var(--text-muted); margin-top:18px; line-height:1.6;}

  .toolbar{
    display:flex; flex-wrap:wrap; align-items:center; gap:12px;
    margin-bottom:18px;
  }
  .search{
    flex:1; min-width:220px;
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:10px 14px;
  }
  .search input{
    background:none; border:none; outline:none; color:var(--text);
    font-size:13px; width:100%;
  }
  .search input::placeholder{color:var(--text-muted);}
  .view-toggle{display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden;}
  .view-toggle button{
    background:var(--surface); border:none; color:var(--text-muted);
    padding:9px 12px; cursor:pointer; font-size:13px;
  }
  .view-toggle button.active{background:var(--surface-2); color:var(--accent);}

  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;}
  .chip{
    background:var(--surface); border:1px solid var(--border);
    color:var(--text-muted); font-size:12.5px; font-weight:500;
    padding:7px 14px; border-radius:20px; cursor:pointer;
    transition:all .15s ease;
  }
  .chip.active{background:var(--accent); color:#06201c; border-color:var(--accent);}
  .chip:hover:not(.active){border-color:var(--accent-dim); color:var(--text);}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px;}
  .list-view{display:flex; flex-direction:column; gap:6px;}

  .card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:16px; cursor:pointer;
    transition:border-color .15s ease, transform .1s ease;
  }
  .card:hover{border-color:var(--accent-dim); transform:translateY(-2px);}
  .card .ficon{font-size:26px; margin-bottom:12px;}
  .card .fname{font-size:13px; font-weight:600; margin-bottom:4px; word-break:break-word;}
  .card .fmeta{font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}

  .row{
    display:flex; align-items:center; gap:14px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:9px; padding:11px 16px; cursor:pointer;
  }
  .row:hover{border-color:var(--accent-dim);}
  .row .ficon{font-size:18px; width:24px; text-align:center;}
  .row .fname{flex:1; font-size:13px; font-weight:500;}
  .row .fmeta{font-size:11.5px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; white-space:nowrap;}

  .empty, .loading, .error-box{
    text-align:center; padding:60px 20px; color:var(--text-muted); font-size:13px;
  }
  .spinner{
    width:22px; height:22px; border-radius:50%;
    border:2.5px solid var(--border); border-top-color:var(--accent);
    animation:spin .7s linear infinite; margin:0 auto 14px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{color:var(--danger);}

  footer{
    max-width:1200px; margin:0 auto; padding:20px 24px 40px;
    font-size:11px; color:var(--text-muted); text-align:center;
  }
  code{background:var(--surface-2); padding:1px 6px; border-radius:4px; font-size:11px;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">CSD</div>
      <div class="brand-text">
        <h1>CSD Document Vault</h1>
        <p>FinalApproved_docsCSD · SharePoint / OneDrive</p>
      </div>
      <span class="status-chip"><span class="status-dot" id="statusDot"></span><span id="statusText">not signed in</span></span>
    </div>
    <div class="auth-area" id="authArea"></div>
  </div>
</header>

<main id="app">
  <!-- populated by JS -->
</main>

<footer>
  Access is verified by Microsoft Entra ID. This page does not collect or store passwords or one-time codes —
  authentication happens entirely on <code>login.microsoftonline.com</code>.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<script>
/* =========================================================================
   CONFIG — fill these in from your Azure app registration before deploying.
   See README.md for the exact steps.
   ========================================================================= */
const CONFIG = {
  clientId: "YOUR_CLIENT_ID_HERE",            // Application (client) ID from Entra ID app registration
  tenantId: "YOUR_TENANT_ID_HERE",            // Directory (tenant) ID  (or "common" for multi-tenant)
  redirectUri: window.location.origin + window.location.pathname,
  folderShareUrl: "https://seccomsa-my.sharepoint.com/:f:/r/personal/103935_sec_se_com_sa/Documents/FinalApproved_docsCSD?csf=1&web=1&e=Ct0GvA"
};
/* ========================================================================= */

const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: CONFIG.redirectUri
  },
  cache: { cacheLocation: "sessionStorage" }
};

const graphScopes = ["Files.Read.All", "Sites.Read.All", "User.Read"];
let msalInstance;
let account = null;
let allItems = [];
let activeFilter = "all";
let viewMode = "grid";

const app = document.getElementById("app");
const authArea = document.getElementById("authArea");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

function encodeShareUrl(url) {
  const base64 = btoa(url).replace(/=/g, "").replace(/\+/g, "-").replace(/\//g, "_");
  return "u!" + base64;
}

function fileIcon(item) {
  if (item.folder) return "📁";
  const name = (item.name || "").toLowerCase();
  if (name.endsWith(".pdf")) return "📕";
  if (name.match(/\.(xlsx|xls|csv)$/)) return "📗";
  if (name.match(/\.(docx|doc)$/)) return "📘";
  if (name.match(/\.(pptx|ppt)$/)) return "📙";
  if (name.match(/\.(png|jpg|jpeg|gif|webp|svg)$/)) return "🖼️";
  if (name.match(/\.(zip|rar|7z)$/)) return "🗜️";
  return "📄";
}

function fileCategory(item) {
  if (item.folder) return "folders";
  const name = (item.name || "").toLowerCase();
  if (name.endsWith(".pdf")) return "pdfs";
  if (name.match(/\.(xlsx|xls|csv)$/)) return "sheets";
  if (name.match(/\.(docx|doc)$/)) return "docs";
  if (name.match(/\.(pptx|ppt)$/)) return "slides";
  if (name.match(/\.(png|jpg|jpeg|gif|webp|svg)$/)) return "images";
  return "other";
}

function formatBytes(bytes) {
  if (bytes === undefined) return "";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
}

function renderAuthArea() {
  if (account) {
    const initials = (account.name || account.username || "?")
      .split(" ").map(p => p[0]).slice(0, 2).join("").toUpperCase();
    authArea.innerHTML = `
      <div class="user-pill">
        <div class="avatar">${initials}</div>
        <span>${account.name || account.username}</span>
      </div>
      <button class="btn btn-ghost" id="signOutBtn">Sign out</button>
    `;
    document.getElementById("signOutBtn").onclick = signOut;
    statusDot.classList.add("live");
    statusText.textContent = "signed in · " + account.username;
  } else {
    authArea.innerHTML = `<button class="btn btn-primary" id="signInBtn">Sign in with Microsoft</button>`;
    document.getElementById("signInBtn").onclick = signIn;
    statusDot.classList.remove("live");
    statusText.textContent = "not signed in";
  }
}

function renderGate() {
  app.innerHTML = `
    <div class="gate">
      <div class="lock">🔒</div>
      <h2>Sign in required</h2>
      <p>This vault is restricted to people your organization has explicitly granted access to.
      Sign in with your Microsoft work account to continue — you'll get a one-time code or MFA prompt
      directly from Microsoft if your account requires it.</p>
      <button class="btn btn-primary" id="gateSignIn" style="width:100%; justify-content:center; padding:12px;">
        Sign in with Microsoft
      </button>
      <div class="fineprint">
        Authentication is handled entirely by <code>login.microsoftonline.com</code> via your organization's
        Entra ID tenant. This app never sees your password or verification code.
      </div>
    </div>
  `;
  document.getElementById("gateSignIn").onclick = signIn;
}

function renderToolbar() {
  return `
    <div class="toolbar">
      <div class="search">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search files by name…" />
      </div>
      <div class="view-toggle">
        <button id="gridBtn" class="${viewMode === "grid" ? "active" : ""}">⊞ Grid</button>
        <button id="listBtn" class="${viewMode === "list" ? "active" : ""}">☰ List</button>
      </div>
      <button class="btn btn-ghost" id="refreshBtn">↻ Refresh</button>
    </div>
    <div class="chips" id="chips">
      ${["all","folders","docs","sheets","slides","pdfs","images","other"].map(c => `
        <button class="chip ${activeFilter===c?"active":""}" data-filter="${c}">
          ${c === "all" ? "All Files" : c[0].toUpperCase()+c.slice(1)}
        </button>`).join("")}
    </div>
  `;
}

function renderItems() {
  const searchVal = (document.getElementById("searchInput")?.value || "").toLowerCase();
  let items = allItems.filter(i => {
    const matchesFilter = activeFilter === "all" || fileCategory(i) === activeFilter;
    const matchesSearch = (i.name || "").toLowerCase().includes(searchVal);
    return matchesFilter && matchesSearch;
  });

  if (items.length === 0) {
    return `<div class="empty">No files match your search or filter.</div>`;
  }

  if (viewMode === "grid") {
    return `<div class="grid">
      ${items.map(i => `
        <div class="card" onclick="openItem('${i.id}')">
          <div class="ficon">${fileIcon(i)}</div>
          <div class="fname">${i.name}</div>
          <div class="fmeta">${i.folder ? (i.folder.childCount + " items") : formatBytes(i.size)} · ${formatDate(i.lastModifiedDateTime)}</div>
        </div>
      `).join("")}
    </div>`;
  } else {
    return `<div class="list-view">
      ${items.map(i => `
        <div class="row" onclick="openItem('${i.id}')">
          <div class="ficon">${fileIcon(i)}</div>
          <div class="fname">${i.name}</div>
          <div class="fmeta">${i.folder ? (i.folder.childCount + " items") : formatBytes(i.size)} · ${formatDate(i.lastModifiedDateTime)}</div>
        </div>
      `).join("")}
    </div>`;
  }
}

function renderApp() {
  app.innerHTML = `
    ${renderToolbar()}
    <div id="itemsContainer">${renderItems()}</div>
  `;
  wireToolbarEvents();
}

function wireToolbarEvents() {
  document.getElementById("searchInput").oninput = () => {
    document.getElementById("itemsContainer").innerHTML = renderItems();
  };
  document.getElementById("gridBtn").onclick = () => { viewMode = "grid"; renderApp(); };
  document.getElementById("listBtn").onclick = () => { viewMode = "list"; renderApp(); };
  document.getElementById("refreshBtn").onclick = () => loadFolder();
  document.querySelectorAll(".chip").forEach(btn => {
    btn.onclick = () => { activeFilter = btn.dataset.filter; renderApp(); };
  });
}

window.openItem = function (id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  if (item.folder) {
    alert("Folder browsing into subfolders isn't wired up in this starter — extend loadFolder() to drill in using this item's id.");
    return;
  }
  if (item.webUrl) window.open(item.webUrl, "_blank");
};

async function getGraphToken() {
  const request = { scopes: graphScopes, account };
  try {
    const result = await msalInstance.acquireTokenSilent(request);
    return result.accessToken;
  } catch (e) {
    const result = await msalInstance.acquireTokenPopup(request);
    return result.accessToken;
  }
}

async function loadFolder() {
  app.innerHTML = `<div class="loading"><div class="spinner"></div>Loading files from OneDrive…</div>`;
  try {
    const token = await getGraphToken();
    const shareId = encodeShareUrl(CONFIG.folderShareUrl);
    const res = await fetch(`https://graph.microsoft.com/v1.0/shares/${shareId}/driveItem/children`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Graph API error ${res.status}: ${errText}`);
    }
    const data = await res.json();
    allItems = data.value || [];
    renderApp();
  } catch (err) {
    app.innerHTML = `<div class="error-box">Couldn't load the folder.<br>${err.message}</div>`;
  }
}

async function signIn() {
  try {
    const result = await msalInstance.loginPopup({ scopes: graphScopes });
    account = result.account;
    renderAuthArea();
    loadFolder();
  } catch (err) {
    alert("Sign-in failed: " + err.message);
  }
}

function signOut() {
  msalInstance.logoutPopup().then(() => {
    account = null;
    renderAuthArea();
    renderGate();
  });
}

async function init() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();
  const result = await msalInstance.handleRedirectPromise();
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    account = accounts[0];
  } else if (result && result.account) {
    account = result.account;
  }
  renderAuthArea();
  if (account) {
    loadFolder();
  } else {
    renderGate();
  }
}

init();
</script>
</body>
</html>
